<!doctype html>
<html lang="es">
  <head>

        margin: 0;

        padding: 24px;
        color: #eceef0;

      main { max-width: 480px; }

        font-size: 0.8rem;
        letter-spacing: 0.18em;
      }
      h1 {
        margin: 14px 0 12px;
        font-size: clamp(1.8rem, 6vw, 2.6rem);

        letter-spacing: -0.025em;
        line-height: 1.1;
      }
      p { margin: 0 0 28px; color: #99a1ab; line-height: 1.65; }

        display: inline-flex;
        align-items: center;
        min-height: 48px;
        padding: 0 24px;
        border-radius: 10px;
        color: #fff7f3;
        font-weight: 600;
        text-decoration: none;
        background: #c75d38;
      }
      a:hover { background: #ad4c2b; }

  <body>
    <main>
